name: Semgrep

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Security Scan
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Semgrep
        shell: bash
        run: |
          set -euo pipefail

          if command -v semgrep >/dev/null 2>&1; then
            semgrep --version
            exit 0
          fi

          if command -v brew >/dev/null 2>&1; then
            brew install semgrep
            semgrep --version
            exit 0
          fi

          python3 -m venv "$RUNNER_TEMP/semgrep-venv"
          "$RUNNER_TEMP/semgrep-venv/bin/pip" install --upgrade pip
          "$RUNNER_TEMP/semgrep-venv/bin/pip" install semgrep
          echo "$RUNNER_TEMP/semgrep-venv/bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/semgrep-venv/bin/semgrep" --version

      - name: Run Semgrep
        run: semgrep scan --config auto --error .
