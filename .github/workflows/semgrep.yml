name: Semgrep

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Security Scan
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep (using brew)
        run: brew install semgrep

      # Alternative (using pip):
      # - name: Install Semgrep via pip
      #   run: pip3 install semgrep

      - name: Run Semgrep
        run: semgrep scan --config auto --error .
