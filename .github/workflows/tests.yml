name: Tests

on:
  push:
    branches: [ main, master, functional ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --dev

      - name: Ruff format (check)
        run: uvx --from ruff ruff format --check .

      - name: Ruff lint
        run: uvx --from ruff ruff check .

      - name: Mypy (critical backends)
        run: uv run mypy src/vistascribe/backend.py src/vistascribe/whisper_server.py

      - name: Run pytest
        env:
          VISTASCRIBE_SETTINGS_PATH: ${{ runner.temp }}/settings.json
        run: uv run pytest -q
