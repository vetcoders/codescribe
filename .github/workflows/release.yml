name: Release DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing tag to publish (for example v0.12.2)
        required: true

permissions:
  contents: write

jobs:
  dmg:
    name: Build, notarize, and publish DMG
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install XcodeGen
        # scripts/build-app.sh preflights `require xcodegen` — the app's
        # .xcodeproj is generated, not committed, so the release runner needs it
        # or the DMG build dies before xcodebuild. (cargo, uniffi-bindgen and
        # xcodebuild are already provided: rust-toolchain installs cargo,
        # uniffi-bindgen is built from `cargo build -p codescribe-ffi`, and
        # xcodebuild ships with the macOS runner image.)
        run: brew install xcodegen

      - name: Validate signing secrets
        env:
          CODESIGN_CERTIFICATE_BASE64: ${{ secrets.CODESIGN_CERTIFICATE_BASE64 }}
          CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.CODESIGN_CERTIFICATE_PASSWORD }}
          CODESCRIBE_CODESIGN_IDENTITY: ${{ secrets.CODESCRIBE_CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          test -n "$CODESIGN_CERTIFICATE_BASE64" || { echo "Missing CODESIGN_CERTIFICATE_BASE64"; exit 1; }
          test -n "$CODESIGN_CERTIFICATE_PASSWORD" || { echo "Missing CODESIGN_CERTIFICATE_PASSWORD"; exit 1; }
          test -n "$CODESCRIBE_CODESIGN_IDENTITY" || { echo "Missing CODESCRIBE_CODESIGN_IDENTITY"; exit 1; }
          test -n "$APPLE_ID" || { echo "Missing APPLE_ID"; exit 1; }
          test -n "$APPLE_TEAM_ID" || { echo "Missing APPLE_TEAM_ID"; exit 1; }
          test -n "$APPLE_APP_SPECIFIC_PASSWORD" || { echo "Missing APPLE_APP_SPECIFIC_PASSWORD"; exit 1; }

      - name: Import Developer ID certificate
        env:
          CODESIGN_CERTIFICATE_BASE64: ${{ secrets.CODESIGN_CERTIFICATE_BASE64 }}
          CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.CODESIGN_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/codesign.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/codesign.keychain-db"
          echo "$CODESIGN_CERTIFICATE_BASE64" | base64 -D > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CODESIGN_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Configure Apple notarization profile
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "CodescribeNotary" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Build signed and notarized DMG artifacts
        env:
          CODESCRIBE_CODESIGN_IDENTITY: ${{ secrets.CODESCRIBE_CODESIGN_IDENTITY }}
          CODESCRIBE_BUNDLE_ID: ${{ vars.CODESCRIBE_BUNDLE_ID || 'com.vetcoders.codescribe' }}
          NOTARY_PROFILE: CodescribeNotary
        run: make release-dmgs

      - name: Alias newest DMG as stable Codescribe.dmg
        # The website pins two asset URLs that must survive the provenance slug
        # (Codescribe_<ver>-<date>-<sha>.dmg): releases/latest/download/Codescribe.dmg
        # and releases/download/v<ver>/Codescribe.dmg. Publish the slug artifact
        # for provenance AND a stable-named copy for the funnel, each with its
        # SHA-256 (bare filename inside, so `shasum -c` works from the download dir).
        run: |
          DMG=$(ls -t Codescribe_*.dmg | head -1)
          test -n "$DMG" || { echo "No Codescribe_*.dmg produced"; exit 1; }
          cp "$DMG" Codescribe.dmg
          shasum -a 256 Codescribe.dmg > Codescribe.dmg.sha256

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: |
            Codescribe_*.dmg
            Codescribe_*.dmg.sha256
            Codescribe.dmg
            Codescribe.dmg.sha256
          generate_release_notes: true
