name: Loctree CI

on:
  push:
    branches: [main, develop, codescribe-foundation]
  pull_request:
    branches: [main, develop]

jobs:
  loctree-analysis:
    name: Loctree Analysis
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: loctree-ci-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            loctree-ci-${{ matrix.os }}-

      - uses: dtolnay/rust-toolchain@stable

      - name: Install loctree
        run: cargo install loctree --locked

      - name: Analyze Rust crate (codescribe-rs)
        run: |
          loctree codescribe-rs/src -A --ext rs \
            --circular \
            --dead \
            --confidence high

      - name: Analyze Python backend
        run: |
          loctree src/codescribe -A --ext py \
            --circular \
            --dead \
            --confidence high

      - name: Check for circular imports (Rust)
        run: |
          OUTPUT=$(loctree codescribe-rs/src -A --circular --json 2>/dev/null || true)
          CYCLES=$(echo "$OUTPUT" | jq -r '.cycles // [] | length' 2>/dev/null || echo "0")
          if [ "$CYCLES" != "0" ] && [ "$CYCLES" != "" ]; then
            echo "::warning::Found $CYCLES circular import(s) in codescribe-rs"
          fi

      - name: Check for circular imports (Python)
        run: |
          OUTPUT=$(loctree src/codescribe -A --circular --json 2>/dev/null || true)
          CYCLES=$(echo "$OUTPUT" | jq -r '.cycles // [] | length' 2>/dev/null || echo "0")
          if [ "$CYCLES" != "0" ] && [ "$CYCLES" != "" ]; then
            echo "::warning::Found $CYCLES circular import(s) in Python backend"
          fi

      - name: Generate HTML reports
        run: |
          loctree codescribe-rs/src -A --ext rs \
            --report rust-report.html --graph || true
          loctree src/codescribe -A --ext py \
            --report python-report.html --graph || true

      - name: Upload analysis reports
        uses: actions/upload-artifact@v4
        with:
          name: loctree-analysis-reports-${{ matrix.os }}
          path: |
            rust-report.html
            python-report.html
          if-no-files-found: ignore
