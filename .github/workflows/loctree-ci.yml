name: Loctree CI

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened]
    branches: [main, develop]

jobs:
  loctree-analysis:
    name: Loctree Analysis
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: loctree-ci-${{ hashFiles('**/Cargo.lock') }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install loctree
        run: cargo install loctree --locked

      - name: Analyze codebase
        run: |
          loct src -A --ext rs \
            --circular \
            --dead \
            --confidence high

      - name: Check for circular imports
        run: |
          OUTPUT=$(loct src --circular --json 2>/dev/null || true)
          CYCLES=$(echo "$OUTPUT" | jq -r '.cycles // [] | length' 2>/dev/null || echo "0")
          if [ "$CYCLES" != "0" ] && [ "$CYCLES" != "" ]; then
            echo "::warning::Found $CYCLES circular import(s)"
          fi

      - name: Health check
        run: loct --health
