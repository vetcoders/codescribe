rules:
  # Secrets and credential patterns (skip this file)
  - id: local.secrets.generic
    languages: [generic]
    message: Possible secret/credential detected
    severity: ERROR
    paths:
      exclude:
        - "**/.semgrep.yaml"
    patterns:
      - pattern-either:
          - pattern: /AIza[0-9A-Za-z\-_]{35}/
          - pattern: /ghp_[0-9A-Za-z]{36}/
          - pattern: /sk-[A-Za-z0-9]{32,}/
          - pattern: /(?i)AWS_SECRET_ACCESS_KEY\s*=\s*[A-Za-z0-9\/\+=]{40}/
          - pattern: /(?i)AWS_ACCESS_KEY_ID\s*=\s*AKIA[0-9A-Z]{16}/
          - pattern: /(?i)PASSWORD\s*=\s*\S+/
          - pattern: /(?i)SECRET\s*=\s*\S+/

  # CI hygiene: disallow sleep in Rust tests
  - id: local.ci.no-sleep-in-tests
    languages: [rust]
    message: Avoid sleep in tests (flaky/slow CI)
    severity: WARNING
    paths:
      include:
        - "**/tests/**"
        - "**/tests.rs"
    patterns:
      - pattern: sleep(...)
      - pattern-either:
          - pattern-inside: |
              #[test]
              fn $F(...) {
                ...
              }
          - pattern-inside: |
              #[tokio::test]
              async fn $F(...) {
                ...
              }
          - pattern-inside: |
              #[cfg(test)]
              mod $M {
                ...
              }

  # Rust: avoid unwrap on File::open
  - id: local.rust.no-file-open-unwrap
    languages: [rust]
    message: Avoid unwrap() on File::open to prevent crashes
    severity: WARNING
    paths:
      include:
        - "**/core/connectors/web.rs"
        - "**/core/pipeline/streaming.rs"
        - "**/core/stt/onnx_adapter.rs"
        - "**/core/tts/audio_output.rs"
      exclude:
        - "**/core/tests/**"
    patterns:
      - pattern: File::open(...).unwrap()
      - pattern-not-inside: |
          #[test]
          fn $F(...) {
            ...
          }
      - pattern-not-inside: |
          #[tokio::test]
          async fn $F(...) {
            ...
          }
      - pattern-not-inside: |
          #[cfg(test)]
          mod $M {
            ...
          }
      - pattern-not-inside: |
          mod tests {
            ...
          }

  # Rust: avoid generic unwrap
  - id: local.rust.no-unwrap
    languages: [rust]
    message: Avoid unwrap(); use ? or expect with context
    severity: WARNING
    paths:
      include:
        - "**/core/config/keychain.rs"
        - "**/core/connectors/web.rs"
        - "**/core/llm/client.rs"
        - "**/core/pipeline/sinks.rs"
        - "**/core/pipeline/streaming.rs"
        - "**/core/state/history.rs"
        - "**/core/stt/onnx_adapter.rs"
        - "**/core/tts/audio_output.rs"
      exclude:
        - "**/core/tests/**"
    patterns:
      - pattern: $X.unwrap()
      - pattern-not: Class::get(...).unwrap()
      - pattern-not-inside: |
          #[test]
          fn $F(...) {
            ...
          }
      - pattern-not-inside: |
          #[tokio::test]
          async fn $F(...) {
            ...
          }
      - pattern-not-inside: |
          #[cfg(test)]
          mod $M {
            ...
          }
      - pattern-not-inside: |
          mod tests {
            ...
          }

  # Bash: disallow curl|bash style installers
  - id: local.bash.no-curl-pipe-sh
    languages: [bash]
    message: Avoid piping curl/wget output to shell
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: curl ... | sh
          - pattern: wget ... | sh

  # JS (Lab): disallow default import of React from our ESM shim
  - id: local.js.no-default-react-import
    languages: [javascript, typescript]
    message: Import React as a named export from ./lib/react.js (no default export)
    severity: ERROR
    paths:
      include:
        - "**/server/codescribe/assets/lab/**"
    pattern: import React from "../lib/react.js";
    fix: import { React } from "../lib/react.js";

  # JS: avoid unload listeners in the lab UI (breaks bfcache / policies)
  - id: local.js.no-unload-listener
    languages: [javascript, typescript]
    message: Avoid `unload` event; use `pagehide` instead to stay bfcache-friendly.
    severity: WARNING
    pattern: window.addEventListener("unload", ...)
