[vars.CODESCRIBE_BUFFERED_SILENCE_SEC]
default = "1.2"
type = "f32"
reload = "restart"
category = "streaming"
description = "Silence duration before utterance flush in buffered mode (sec)"
range = "0.1-10.0"

[vars.CODESCRIBE_UTTERANCE_GAP_SEC]
default = "0.5"
type = "f32"
reload = "hot"
category = "vad"
description = "Silero utterance gap threshold in seconds"

[vars.CODESCRIBE_TAIL_SILENCE_SEC]
default = "2.0"
type = "f32"
reload = "hot"
category = "vad"
description = "Trailing silence threshold before the tail filter can drop a low-speech suffix"

[vars.CODESCRIBE_TAIL_DROP_ENABLED]
default = "1"
type = "bool"
reload = "hot"
category = "vad"
description = "Enable low-speech trailing-tail removal after the Silero gate"

[vars.TRANSCRIPTION_OVERLAY_ENABLED]
default = "1"
type = "bool"
reload = "hot"
category = "ui"
description = "Enable live non-assistive transcription overlay; when disabled the next capture uses a buffered no-overlay profile"

[vars.TRAY_START_ASSISTIVE]
default = "0"
