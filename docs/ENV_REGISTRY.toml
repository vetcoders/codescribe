# ENV_REGISTRY.toml - Central registry of all environment variables
#
# SINGLE SOURCE OF TRUTH for Codescribe environment configuration.
# This file is validated by pre-commit hooks - any new env var MUST be added here.
#
# Schema per variable:
#   [vars.<NAME>]
#   default = "value"           # Default value (string)
#   type = "string|bool|f32|u64"  # Value type
#   reload = "hot|restart|rebuild"  # When changes take effect
#   category = "vad|audio|llm|..." # Grouping
#   description = "..."         # Human-readable description
#   deprecated = "NEW_VAR"      # If deprecated, points to replacement
#
# Created by Vetcoders (c)2026

[meta]
version = "1.1.0"
updated = "2026-07-16"

# ═══════════════════════════════════════════════════════════════════════════════
# VAD (Voice Activity Detection) - Silero Neural Network
# ═══════════════════════════════════════════════════════════════════════════════
# VAD internals are hardcoded in `core/vad/config.rs` based on Silero defaults.
# No user-configurable VAD env vars.

# ═══════════════════════════════════════════════════════════════════════════════
# Audio / Recording
# ═══════════════════════════════════════════════════════════════════════════════

[vars.AUDIO_INPUT_DEVICE]
default = ""
type = "string"
reload = "restart"
category = "audio"
description = "Audio input device name (empty = system default)"

[vars.AUTO_SILENCE]
default = "1"
type = "bool"
reload = "restart"
category = "audio"
description = "Enable silence auto-stop in recorder"

[vars.BEEP_ON_START]
default = "1"
type = "bool"
reload = "restart"
category = "audio"
description = "Play beep when recording starts"

[vars.SOUND_NAME]
default = "Tink"
type = "string"
reload = "restart"
category = "audio"
description = "macOS system sound name for beep"

[vars.SOUND_VOLUME]
default = "1.0"
type = "f32"
reload = "restart"
category = "audio"
description = "Sound volume (0.0-1.0)"
range = "0.0-1.0"

