# ═══════════════════════════════════════════════════════════════════════════════
# Debug / Test
# ═══════════════════════════════════════════════════════════════════════════════

[vars.CODESCRIBE_DEBUG_TOKENS]
default = "0"
type = "bool"
reload = "restart"
category = "debug"
description = "Debug token output from Whisper"

[vars.CODESCRIBE_STREAM_LOG]
default = "0"
type = "bool"
reload = "hot"
category = "debug"
description = "Enable streaming debug log"

[vars.CODESCRIBE_STREAM_LOG_PATH]
default = ""
type = "string"
reload = "hot"
category = "debug"
description = "Path for streaming debug log"

[vars.RUST_LOG]
default = ""
type = "string"
reload = "restart"
category = "debug"
description = "Rust logging filter"

[vars.LOG_LEVEL]
default = "info"
type = "string"
reload = "restart"
category = "debug"
description = "Legacy logging filter (used if RUST_LOG is unset)"

[vars.CODESCRIBE_UI_TESTS]
default = "0"
type = "bool"
reload = "restart"
category = "debug"
description = "Enable AppKit/UI tests gated by CODESCRIBE_UI_TESTS"

# ═══════════════════════════════════════════════════════════════════════════════
# ASSISTIVE CONTEXT CAPTURE
# ═══════════════════════════════════════════════════════════════════════════════

[vars.ASSISTIVE_CONTEXT_MAX_CHARS]
default = "5000"
type = "usize"
reload = "restart"
category = "assistive"
description = "Max characters captured from selection for assistive context"

[vars.ASSISTIVE_CONTEXT_COPY_DELAY_MS]
default = "150"
type = "u64"
reload = "restart"
category = "assistive"
description = "Delay in ms after Cmd+C before reading clipboard (macOS timing)"

[vars.CODESCRIBE_ATTACH_PDF_PAGES]
default = "3"
type = "usize"
reload = "restart"
category = "assistive"
description = "Max PDF pages to extract for attachments"

[vars.CODESCRIBE_ATTACH_PDF_OCR]
default = "1"
type = "bool"
reload = "restart"
category = "assistive"
description = "Enable OCR fallback for PDF attachments"

[vars.CODESCRIBE_ATTACH_PDF_OCR_LANG]
default = "pol+eng"
type = "string"
reload = "restart"
category = "assistive"
description = "OCR language(s) for PDF attachments (tesseract)"

[vars.CODESCRIBE_DRAWER_INCLUDE_LEGACY]
default = "0"
type = "bool"
reload = "restart"
category = "assistive"
description = "Include legacy transcript files in Drawer alongside ThreadStore entries (off by default)."

# Agent / Chat input behavior

[vars.AGENT_ENTER_SENDS]
default = "1"
type = "bool"
reload = "restart"
category = "assistive"
description = "When true, Enter sends the agent message (Shift+Enter for newline). When false, Enter inserts newline (Cmd+Enter sends)."

[vars.ASSISTIVE_CONTEXT_PROMPT_MAX_CHARS]
default = "5000"
type = "usize"
reload = "restart"
category = "assistive"
description = "Max characters captured from selection for assistive context prompt"

[vars.CODESCRIBE_ASSISTIVE_DEADLINE_SECS]
default = "15"
type = "u64"
reload = "hot"
category = "assistive"
description = "Timeout in seconds for assistive tasks"

[vars.TRACE_PIPELINE]
default = "0"
type = "bool"
reload = "hot"
category = "debug"
description = "Enable verbose pipeline tracing"

[vars.TRANSCRIPTION_OVERLAY_AUTO_HIDE_SECS]
default = "4"
type = "u64"
reload = "hot"
category = "ui"
description = "Auto-hide delay for transcription overlay in seconds"

[vars.VOICE_CHAT_RECENT_CONTEXT_TTL_SECS]
default = "60"
type = "u64"
reload = "hot"
category = "assistive"
description = "TTL for recent context in voice chat (seconds)"

[vars.VOICE_CHAT_RECENT_SELECTION_MAX_CHARS]
default = "5000"
type = "usize"
reload = "restart"
category = "assistive"
description = "Max characters captured from recent selection for voice chat"
