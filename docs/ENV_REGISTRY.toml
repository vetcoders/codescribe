# ENV_REGISTRY.toml - Central registry of all environment variables
#
# SINGLE SOURCE OF TRUTH for CodeScribe environment configuration.
# This file is validated by pre-commit hooks - any new env var MUST be added here.
#
# Schema per variable:
#   [vars.<NAME>]
#   default = "value"           # Default value (string)
#   type = "string|bool|f32|u64"  # Value type
#   reload = "hot|restart|rebuild"  # When changes take effect
#   category = "vad|audio|llm|..." # Grouping
#   description = "..."         # Human-readable description
#   deprecated = "NEW_VAR"      # If deprecated, points to replacement
#
# Created by M&K (c)2026 VetCoders

[meta]
version = "1.0.0"
updated = "2026-02-24"

# ═══════════════════════════════════════════════════════════════════════════════
# VAD (Voice Activity Detection) - Silero Neural Network
# ═══════════════════════════════════════════════════════════════════════════════
# VAD internals are hardcoded in `core/vad/config.rs` based on Silero defaults.
# No user-configurable VAD env vars.

# ═══════════════════════════════════════════════════════════════════════════════
# Audio / Recording
# ═══════════════════════════════════════════════════════════════════════════════

[vars.AUDIO_INPUT_DEVICE]
default = ""
type = "string"
reload = "restart"
category = "audio"
description = "Audio input device name (empty = system default)"

[vars.AUTO_SILENCE]
default = "1"
type = "bool"
reload = "restart"
category = "audio"
description = "Enable silence auto-stop in recorder"

[vars.BEEP_ON_START]
default = "1"
type = "bool"
reload = "restart"
category = "audio"
description = "Play beep when recording starts"

[vars.SOUND_NAME]
default = "Tink"
type = "string"
reload = "restart"
category = "audio"
description = "macOS system sound name for beep"

[vars.SOUND_VOLUME]
default = "1.0"
type = "f32"
reload = "restart"
category = "audio"
description = "Sound volume (0.0-1.0)"
range = "0.0-1.0"

# ═══════════════════════════════════════════════════════════════════════════════
# Streaming / Buffering
# ═══════════════════════════════════════════════════════════════════════════════

[vars.CODESCRIBE_BUFFER_DELAY_MS]
default = "280"
type = "u64"
reload = "hot"
category = "streaming"
description = "Buffer delay in milliseconds (skipped for first emission to give instant feedback)"

[vars.CODESCRIBE_TYPING_CPS]
default = "90"
type = "f32"
reload = "hot"
category = "streaming"
description = "Typing speed in characters per second"

[vars.CODESCRIBE_EMIT_WORDS_MAX]
default = "2"
type = "u64"
reload = "hot"
category = "streaming"
description = "Maximum words emitted per tick (buffered mode)"

[vars.CODESCRIBE_MAX_INFERENCE_CONCURRENCY]
default = "1"
type = "u64"
reload = "hot"
category = "streaming"
description = "Maximum number of concurrent inference tasks in streaming pipeline (clamped to 1-4)"
range = "1-4"

[vars.CODESCRIBE_STREAM_CHUNK_SEC]
default = "4.0"
type = "f32"
reload = "hot"
category = "streaming"
description = "Streaming chunk duration in seconds (utterance cadence)"
range = "0.5-30.0"

[vars.CODESCRIBE_STREAM_OVERLAP_RATIO]
default = "0.25"
type = "f32"
reload = "hot"
category = "streaming"
description = "Overlap ratio between chunks"
range = "0.05-0.8"

[vars.CODESCRIBE_STREAM_SIMILARITY]
default = "0.93"
type = "f32"
reload = "hot"
category = "streaming"
description = "Similarity threshold for deduplication"

[vars.CODESCRIBE_STREAM_NOVELTY]
default = "0.12"
type = "f32"
reload = "hot"
category = "streaming"
description = "Novelty threshold for deduplication"

[vars.CODESCRIBE_STREAM_DISABLE_EMBEDDINGS]
default = "0"
type = "bool"
reload = "hot"
category = "streaming"
description = "Disable embedding-based deduplication"

[vars.CODESCRIBE_STREAM_FORCE_EMBEDDINGS]
default = "0"
type = "bool"
reload = "hot"
category = "streaming"
description = "Force embeddings in tests (override test bypass)"

[vars.CODESCRIBE_STREAM_LEXICON]
default = "0"
type = "bool"
reload = "hot"
category = "streaming"
description = "Apply lexicon post-processing to streaming output"

[vars.CODESCRIBE_STRIP_TRAILING_SMILEY_D]
default = "1"
type = "bool"
reload = "hot"
category = "streaming"
description = "Strip trailing ':D' hallucinations from streaming output"

[vars.CODESCRIBE_BUFFERED_CORRECTION_PREFIX]
default = "0.50"
type = "f32"
reload = "hot"
category = "streaming"
description = "Prefix ratio required to accept buffered correction"
range = "0.4-0.9"

[vars.CODESCRIBE_BUFFERED_INTERIM_SEC]
default = "1.2"
type = "f32"
reload = "hot"
category = "streaming"
description = "Interim emission cadence for buffered mode (sec)"
range = "1.0-30.0"

[vars.CODESCRIBE_BUFFERED_SILENCE_SEC]
default = ""
type = "f32"
reload = "restart"
category = "streaming"
description = "Override silence duration before utterance flush in buffered mode (sec)"
range = "0.1-10.0"

[vars.TRANSCRIPTION_OVERLAY_ENABLED]
default = "1"
type = "bool"
reload = "hot"
category = "ui"
description = "Enable live non-assistive transcription overlay; when disabled the next capture uses a buffered no-overlay profile"

