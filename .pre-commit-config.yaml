repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

ci:
  autofix_commit_msg: "chore(pre-commit): auto-fix from ruff"
  autofix_prs: true
  skip: []

default_language_version:
  python: python3.12

