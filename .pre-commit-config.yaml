# Pre-commit hooks for Codescribe (Pure Rust)
# Install: pipx install pre-commit && pre-commit install --hook-type pre-commit --hook-type pre-push
# Run: pre-commit run --all-files
#
# Created by Vetcoders (c)2026

minimum_pre_commit_version: "3.5.0"

repos:
  # Essential hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: mixed-line-ending
      - id: detect-private-key

  # Rust hooks (pre-commit stage)
  - repo: local
    hooks:
      - id: cargo-check
        name: cargo check
        entry: cargo check --all-targets
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-commit]

      - id: cargo-fmt
        name: cargo fmt (fix)
        entry: bash -c 'cargo fmt --all && git add -u'
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-commit]

  # Prettier for non-Rust files (pre-commit stage)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v2.7.1
    hooks:
      - id: prettier
        name: prettier (non-rust)
        files: '\\.(md|mdx|json|ya?ml|html?|css|scss|js|jsx|ts|tsx|mjs|cjs)$'
        stages: [pre-commit]

  # Rust + Security hooks (pre-push stage)
  - repo: local
    hooks:
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

      - id: semgrep
        name: semgrep security scan
        entry: semgrep scan --config auto --error .
        language: system
        pass_filenames: false
        stages: [pre-push]
