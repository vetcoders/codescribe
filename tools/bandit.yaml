# Bandit configuration for CodeScribe
exclude_dirs:
  - .venv
  - dist
  - build
  - packaging
  - logs
  - models
  - tests
  - scripts
  - server/codescribe/app
  - server/codescribe/formatting
# Skip Low severity issues that are acceptable in this codebase:
# B101: assert for internal invariants is fine
# B110, B112: try-except-pass/continue for best-effort cleanup and streaming
# B404: subprocess import needed for macOS system commands
# B603: subprocess with list args (not shell=True) is safe
# B607: calling known system tools (osascript, security, ffmpeg) is expected
skips:
  - B101
  - B110
  - B112
  - B311  # random used for retry jitter, not crypto
  - B404
  - B603
  - B607
targets:
  - server/codescribe
